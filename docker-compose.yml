services:
  postgres:
    image: postgres:16-alpine
    container_name: bora-treinar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bora_treinar}
      POSTGRES_USER: ${POSTGRES_USER:-bora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bora_password_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bora_treinar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bora_user} -d ${POSTGRES_DB:-bora_treinar}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bora_treinar_postgres_data:
