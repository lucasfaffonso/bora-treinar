<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comunidades | Bora Treinar</title>
    <meta
      name="description"
      content="Crie, encontre e gerencie comunidades no Bora Treinar."
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/global.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />
    <link rel="stylesheet" href="../../assets/css/user-common-pages.css" />
    <link rel="stylesheet" href="../../assets/css/communities-create.css" />
    <link rel="stylesheet" href="../../assets/css/communities-discovery.css" />
  </head>

  <body data-page="communities" data-page-type="protected" data-layout="app">
    <div class="app-layout">
      <aside class="sidebar" data-bt-sidebar aria-label="Menu principal"></aside>

      <div class="main-area">
        <header class="topbar" data-bt-topbar></header>

        <main class="page-content user-common-page">
          <section class="user-page-hero communities-user-hero">
            <div class="user-page-hero-content">
              <span class="badge badge-info">
                <i class="bi bi-people" aria-hidden="true"></i>
                Comunidades
              </span>

              <h1>Crie grupos, convide pessoas e treine em comunidade.</h1>

              <p>
                Organize grupos públicos ou privados, encontre comunidades visíveis,
                acompanhe solicitações de entrada e acesse a sala de conversa dos
                grupos em que você participa.
              </p>

              <div class="user-page-hero-actions">
                <a class="btn btn-primary" href="#communityBuilder">
                  <i class="bi bi-plus-circle" aria-hidden="true"></i>
                  Criar comunidade
                </a>
              </div>
            </div>
          </section>

          <section id="communityBuilder" data-community-builder-root></section>
        </main>
      </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/branding.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
