<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa | Bora Treinar</title>
    <meta
      name="description"
      content="Pesquise treinos, exercícios e sessões registradas no Bora Treinar."
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/pages.css" />
  </head>

  <body data-page="search" data-page-type="protected" data-layout="app">
    <div class="app-layout">
      <aside class="sidebar" data-bt-sidebar aria-label="Menu principal"></aside>

      <div class="main-area">
        <header class="topbar" data-bt-topbar></header>

        <main class="page-content">
          <section class="page-header">
            <div class="page-title-group">
              <h2 class="page-title">Pesquisa</h2>
              <p class="page-description">
                Encontre dados salvos neste navegador.
              </p>
            </div>
          </section>

          <section class="content-card">
            <div class="content-card-header">
              <div>
                <span class="badge badge-info">Busca local</span>
                <h3 class="content-card-title mt-md">Pesquisar no app</h3>
                <p class="content-card-description mt-sm">
                  A pesquisa consulta treinos, exercícios e sessões registradas.
                </p>
              </div>
            </div>

            <div class="content-card-body">
              <div class="search-box">
                <i class="bi bi-search search-icon" aria-hidden="true"></i>
                <input
                  class="input"
                  type="search"
                  placeholder="Buscar por nome, objetivo ou exercício"
                  aria-label="Pesquisar dados locais"
                  data-local-search-input
                />
              </div>
            </div>
          </section>

          <section class="dashboard-section">
            <div class="dashboard-section-header">
              <div>
                <h2 class="dashboard-section-title">Resultados</h2>
                <p class="page-description" data-local-search-summary>
                  Digite algo para pesquisar.
                </p>
              </div>
            </div>

            <div class="workout-exercise-list" data-local-search-results>
              <article class="content-card">
                <div class="content-card-header">
                  <div>
                    <span class="badge badge-info">Estado vazio</span>
                    <h3 class="content-card-title mt-md">
                      Nenhuma busca realizada.
                    </h3>
                    <p class="content-card-description mt-sm">
                      Use o campo acima para consultar dados cadastrados.
                    </p>
                  </div>
                </div>
              </article>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/branding.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/search.js"></script>
  </body>
</html>
